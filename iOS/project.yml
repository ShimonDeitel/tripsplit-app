name: tripsplit
options:
  bundleIdPrefix: com.shimondeitel
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    DEVELOPMENT_TEAM: W7Q885Q59C
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
targets:
  tripsplit:
    type: application
    platform: iOS
    sources: [tripsplit]
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.tripsplit
        INFOPLIST_FILE: tripsplit/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1,2"
    info:
      path: tripsplit/Info.plist
      properties:
        UILaunchScreen: {}
        UISupportedInterfaceOrientations: [UIInterfaceOrientationPortrait]
        CFBundleDisplayName: Tripmate Split
  tripsplitTests:
    type: bundle.unit-test
    platform: iOS
    sources: [tripsplitTests]
    dependencies:
      - target: tripsplit
  tripsplitUITests:
    type: bundle.ui-testing
    platform: iOS
    sources: [tripsplitUITests]
    dependencies:
      - target: tripsplit
schemes:
  tripsplit:
    build:
      targets:
        tripsplit: all
    test:
      targets:
        - tripsplitTests
        - tripsplitUITests
